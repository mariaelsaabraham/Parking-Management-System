<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<h1 >Smart Parking Dashboard</h1>

<div class="card-container">

    <div class="option-card">
        <h2>Vehicle Verification</h2>
        <p>Verify vehicle using camera plate detection</p>
        <button onclick="goToVerification()">Go to Verification</button>
    </div>

    <div class="option-card">
        <h2>Search & Book Slot</h2>
        <p>Find loaction and reserve parking slot</p>
        <button onclick="goToLocation()">Book Slot</button>
    </div>

</div>

<script src="dashboard.js"></script>
</body>
</html>
